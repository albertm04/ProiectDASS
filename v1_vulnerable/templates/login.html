{% extends "base.html" %}
{% block title %}Login – AuthX v1{% endblock %}
{% block content %}
<h2>Autentificare</h2>
<form method="post" action="{{ url_for('login') }}">
    <label>Email</label>
    <input type="email" name="email" required placeholder="user@example.com">
    <label>Parolă</label>
    <input type="password" name="password" required>
    <button type="submit">Login</button>
</form>
<p><a href="{{ url_for('forgot_password') }}" class="btn">Am uitat parola</a></p>
{% endblock %}
